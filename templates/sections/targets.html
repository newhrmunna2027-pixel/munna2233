<div class="flex flex-col md:flex-row justify-between items-center bg-[#1B1E31] p-4 rounded-2xl shadow-lg border border-gray-800 gap-4 mb-6">
    <div class="w-full md:w-2/3 relative">
        <i class="fas fa-search absolute left-4 top-4 text-gray-500"></i>
        <input type="text" id="searchInput" placeholder="Search UID or Name..." onkeyup="renderTargets()" class="w-full bg-[#0b0d17] border border-gray-700 text-white rounded-xl py-3 pl-10 pr-4 outline-none focus:border-yellow-400 transition font-bold">
    </div>
    <button onclick="document.getElementById('add-modal').classList.replace('hidden', 'flex')" class="w-full md:w-1/3 bg-emerald-500 hover:bg-emerald-400 text-white font-black px-6 py-3 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.3)] transition uppercase tracking-widest">
        + ADD TARGET
    </button>
</div>

<!-- Grid for Targets -->
<div id="targets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4"></div>

<!-- Delete Modal -->
<div id="delete-modal" class="fixed inset-0 hidden items-center justify-center bg-black/90 backdrop-blur-sm z-[200]">
    <div class="bg-[#1B1E31] border border-gray-800 w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl mx-4">
        <div class="w-20 h-20 rounded-full bg-rose-500/20 text-rose-500 flex items-center justify-center mx-auto mb-6"><i class="fas fa-trash-alt text-4xl"></i></div>
        <h4 class="text-2xl font-black text-white mb-2 uppercase">Remove Target?</h4>
        <p class="text-sm text-gray-400 font-bold mb-8">This action will stop the protocol.</p>
        <div class="flex gap-4">
            <button onclick="document.getElementById('delete-modal').classList.replace('flex','hidden')" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-xl transition">Cancel</button>
            <button onclick="deleteTarget()" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-xl shadow-lg transition">Delete</button>
        </div>
    </div>
</div>
