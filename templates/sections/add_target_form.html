<div id="add-modal" class="fixed inset-0 hidden items-center justify-center bg-black/90 backdrop-blur-sm z-[100]">
    <div class="bg-[#0f111a] border border-[#2a2d3d] w-full max-w-[26rem] rounded-[2rem] shadow-2xl relative overflow-hidden p-6 max-h-[95vh] overflow-y-auto mx-4">
        <button onclick="document.getElementById('add-modal').classList.replace('flex','hidden')" class="absolute top-5 right-5 text-gray-500 hover:text-white bg-gray-800 p-2 rounded-full transition z-20"><i class="fas fa-times"></i></button>
        <h3 class="text-xl font-black text-white uppercase tracking-widest mb-6">ADD NEW TARGET</h3>

        <div class="space-y-4">
            <select id="t-duration" class="w-full bg-[#161925] border border-[#2a2d3d] rounded-xl p-3 text-sm font-bold text-yellow-400 outline-none focus:border-yellow-400">
                <option value="1 day">Duration: 1 Day</option><option value="7 day">Duration: 7 Days</option><option value="30 day">Duration: 30 Days</option><option value="permanent">Duration: Permanent</option>
            </select>

            <input type="number" id="t-uid" placeholder="Enter Target UID" class="w-full bg-[#161925] border border-[#2a2d3d] rounded-xl p-3 text-base font-bold text-white outline-none focus:border-yellow-400 placeholder-gray-600">
            
            <!-- Existing Target Warning Box -->
            <div id="t-existing-warning" class="hidden items-center justify-between bg-rose-500/10 border border-rose-500/20 rounded-xl p-3">
                <span class="text-rose-500 text-xs font-black uppercase tracking-widest flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> Target Already Active</span>
                <button id="t-existing-view-btn" class="bg-rose-600 hover:bg-rose-500 text-white text-[10px] font-black p-2 rounded-lg transition-colors shadow-md"><i class="fas fa-eye text-sm"></i></button>
            </div>

            <input type="text" id="t-reason" placeholder="Enter Reason (Optional)" class="w-full bg-[#161925] border border-[#2a2d3d] rounded-xl p-3 text-sm font-bold text-white outline-none focus:border-yellow-400 placeholder-gray-600">

            <!-- Profile Preview Box -->
            <div id="t-ff-preview" class="hidden relative bg-[#13151f] rounded-xl overflow-hidden border border-[#2a2d3d] shadow-lg mt-2">
                <div class="h-24 w-full bg-gradient-to-r from-purple-900 to-indigo-900 relative border-b-2 border-yellow-400">
                    <img id="ff-banner" src="" class="w-full h-full object-cover opacity-80 absolute inset-0">
                    <div class="absolute right-2 bottom-2 text-white text-xs font-bold flex items-center gap-1 drop-shadow-md z-10"><i class="fas fa-thumbs-up"></i> <span id="ff-likes">0</span></div>
                </div>
                <div class="px-4 pb-4 relative z-10">
                    <div class="relative -mt-10 mb-3">
                        <div class="w-[75px] h-[75px] rounded-lg border-2 border-white bg-black shadow-lg mx-auto relative">
                            <img id="ff-avatar" src="" class="w-full h-full object-cover rounded-md">
                            <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-black text-[10px] font-black px-2 py-0.5 rounded shadow whitespace-nowrap">Lv.<span id="ff-level">0</span></div>
                        </div>
                    </div>
                    <div class="mb-3 border-b border-white/5 pb-3 text-center">
                        <h4 id="ff-name" class="text-xl font-black text-white game-font">Name</h4>
                        <div class="text-yellow-400 text-xs font-bold mt-1 font-mono">UID: <span id="ff-uid-display"></span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2 text-[10px] text-gray-400 font-bold px-2">
                        <div>Guild</div><div class="text-right text-yellow-400 game-font text-xs truncate" id="ff-guild"></div>
                        <div>Leader</div><div class="text-right text-cyan-400 font-mono cursor-pointer hover:underline" id="ff-leader" onclick="viewLeaderProfile(this.innerText)"></div>
                        <div>Region</div><div class="text-right text-gray-300" id="ff-region"></div>
                        <div>Created</div><div class="text-right text-gray-300" id="ff-create"></div>
                        <div>Last Login</div><div class="text-right text-emerald-400" id="ff-login"></div>
                    </div>
                </div>
            </div>

            <button id="btn-submit" onclick="submitTargetData()" class="w-full bg-gray-700 text-gray-400 font-black py-4 rounded-xl text-sm uppercase tracking-wider transition-all mt-4 cursor-not-allowed" disabled>START ATTACK</button>
        </div>
    </div>
</div>

<script>
    let fetchTimer;
    document.getElementById('t-uid').addEventListener('input', function() {
        clearTimeout(fetchTimer);
        document.getElementById('t-ff-preview').classList.add('hidden');
        document.getElementById('t-existing-warning').classList.replace('flex', 'hidden'); 
        
        let btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "START ATTACK"; btn.className = "w-full bg-gray-700 text-gray-400 font-black py-4 rounded-xl text-sm uppercase tracking-wider mt-4 cursor-not-allowed";
        
        const uid = this.value.trim();
        let existingTarget = allTargets.find(t => t.uid === uid);

        if(uid.length > 5) {
            btn.innerText = "SEARCHING UID...";
            fetchTimer = setTimeout(async () => {
                try {
                    // Fetch profile (API call always happens to show latest preview)
                    let res = await fetch('/api/fetch_profile', { method: 'POST', body: JSON.stringify({uid: uid, save: false, force: true}) });
                    let d = await res.json();

                    if(d.success) {
                        const basic = d.data.basicInfo || {};
                        const clan = d.data.clanBasicInfo || {};
                        
                        document.getElementById('ff-uid-display').innerText = uid;
                        document.getElementById('ff-name').innerText = basic.nickname || 'Unknown';
                        document.getElementById('ff-level').innerText = basic.level || 0;
                        document.getElementById('ff-likes').innerText = basic.liked || 0;
                        document.getElementById('ff-guild').innerText = clan.clanName || "No Guild";
                        document.getElementById('ff-leader').innerText = clan.captainId || "N/A";
                        document.getElementById('ff-region').innerText = basic.region || 'N/A';
                        
                        document.getElementById('ff-create').innerText = formatDateTime(basic.createAt);
                        document.getElementById('ff-login').innerText = formatDateTime(basic.lastLoginAt);

                        let hPicId = basic.headPic || "902000003";
                        let bannerId = basic.bannerId || "901000001";
                        document.getElementById('ff-avatar').src = `https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${hPicId}.png`;
                        document.getElementById('ff-banner').src = `https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${bannerId}.png`;
                        
                        document.getElementById('t-ff-preview').classList.remove('hidden');

                        // Check if existing after data load
                        if(existingTarget) {
                            document.getElementById('t-existing-warning').classList.replace('hidden', 'flex');
                            btn.disabled = true; btn.innerText = "TARGET EXISTS";
                            
                            document.getElementById('t-existing-view-btn').onclick = () => {
                                document.getElementById('add-modal').classList.replace('flex', 'hidden'); 
                                viewProfileData(existingTarget.uid, existingTarget.expireAt, existingTarget.addTime); 
                            };
                        } else {
                            btn.disabled = false; btn.innerText = "START ATTACK"; 
                            btn.className = "w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-xl text-sm uppercase tracking-wider mt-4 shadow-lg";
                        }
                    } else { btn.innerText = "UID NOT FOUND"; }
                } catch(e) { btn.innerText = "ERROR"; }
            }, 1000);
        } else { btn.innerText = "START ATTACK"; }
    });

    async function submitTargetData() {
        const uid = document.getElementById('t-uid').value;
        const duration = document.getElementById('t-duration').value;
        const reason = document.getElementById('t-reason').value;
        let btn = document.getElementById('btn-submit'); 
        btn.disabled = true; btn.innerText = "PROCESSING...";

        try {
            let res = await fetch('/api/target/add', { method: 'POST', body: JSON.stringify({uid, duration, reason}) });
            let data = await res.json();
            if(data.success) { 
                document.getElementById('add-modal').classList.replace('flex', 'hidden'); 
                fetchTargets(); 
                document.getElementById('t-uid').value=''; 
                document.getElementById('t-reason').value='';
                document.getElementById('t-ff-preview').classList.add('hidden');
                document.getElementById('t-existing-warning').classList.replace('flex', 'hidden');
            } else alert(data.msg);
        } catch(e) { alert("Error Adding Target"); }
        btn.disabled = false; btn.innerText = "START ATTACK";
    }
</script>
